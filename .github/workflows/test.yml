name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Build
      run: cargo build --verbose
    
    - name: Run tests
      run: cargo test --package mdbook-html --features search --verbose

  # Test cargo install --git
  install-test:
    runs-on: ubuntu-latest
    steps:
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Test cargo install from git
      run: |
        cargo install --git https://github.com/CNCSMonster/mdbook-zh-search.git --locked
        mdbook --version
